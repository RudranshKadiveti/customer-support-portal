<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login — Support Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-deep: #020818; --cyan: #00e5ff; --violet: #7c3aed;
            --glass: rgba(255,255,255,0.04); --glass-border: rgba(255,255,255,0.08);
            --text: #e2e8f0; --text-soft: #64748b;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 1.5rem; overflow: hidden;
        }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none;
            background:
                radial-gradient(ellipse 70% 60% at 15% 10%, rgba(0,229,255,.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 85% 90%, rgba(124,58,237,.1) 0%, transparent 60%);
        }
        body::after {
            content:''; position:fixed; inset:0; pointer-events:none;
            background-image:
                linear-gradient(rgba(0,229,255,.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,255,.02) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .login-wrap {
            position: relative; z-index: 1;
            width: 100%; max-width: 440px;
            animation: up .5s ease both;
        }
        @keyframes up { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:none;} }

        /* Glow ring */
        .glow-ring {
            position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 21px;
            background: linear-gradient(135deg, rgba(0,229,255,.2), transparent 40%, rgba(124,58,237,.15) 100%);
            z-index: -1;
        }

        .card-outer {
            background: rgba(6,15,46,0.8);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(24px);
            overflow: hidden;
            position: relative;
        }
        .card-top {
            padding: 2.5rem 2.5rem 2rem;
            border-bottom: 1px solid var(--glass-border);
            position: relative;
        }
        .card-top::after {
            content: '';
            position: absolute; bottom: 0; left: 2.5rem; right: 2.5rem;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,229,255,.3), transparent);
        }
        .brand {
            display: flex; align-items: center; gap: .6rem; margin-bottom: 1.5rem;
        }
        .brand-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, rgba(0,229,255,.2), rgba(124,58,237,.2));
            border: 1px solid rgba(0,229,255,.25);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: var(--cyan); font-size: 1rem;
        }
        .brand-name {
            font-family: 'Syne', sans-serif;
            font-size: .75rem; font-weight: 700;
            letter-spacing: .14em; text-transform: uppercase;
            color: rgba(255,255,255,.5);
        }
        .card-top h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem; font-weight: 800;
            color: #fff; margin-bottom: .3rem;
        }
        .card-top p { font-size: .84rem; color: var(--text-soft); }

        .card-body-area { padding: 2rem 2.5rem 2.5rem; }

        .form-label {
            font-size: .72rem; font-weight: 500;
            text-transform: uppercase; letter-spacing: .08em;
            color: var(--text-soft); margin-bottom: .45rem; display: block;
        }
        .form-control {
            width: 100%;
            background: rgba(255,255,255,.04);
            border: 1px solid var(--glass-border);
            border-radius: 10px; color: var(--text);
            font-family: 'Inter', sans-serif; font-size: .88rem;
            padding: .65rem .9rem; transition: all .2s;
        }
        .form-control:focus {
            background: rgba(255,255,255,.07);
            border-color: rgba(0,229,255,.4);
            box-shadow: 0 0 0 3px rgba(0,229,255,.07);
            color: #fff; outline: none;
        }
        .form-control::placeholder { color: rgba(255,255,255,.18); }
        .input-wrap { position: relative; }
        .input-icon { position:absolute; right:.85rem; top:50%; transform:translateY(-50%); color:rgba(255,255,255,.2); font-size:.9rem; pointer-events:none; }
        .toggle-pw { position:absolute; right:.85rem; top:50%; transform:translateY(-50%); background:none; border:none; padding:0; color:rgba(255,255,255,.25); cursor:pointer; font-size:.9rem; transition:color .15s; }
        .toggle-pw:hover { color: var(--cyan); }
        .hint { font-size:.72rem; color:var(--text-soft); margin-top:.35rem; font-style:italic; }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, rgba(0,229,255,.15), rgba(124,58,237,.15));
            border: 1px solid rgba(0,229,255,.3);
            color: var(--cyan);
            font-family: 'Syne', sans-serif;
            font-size: .88rem; font-weight: 700;
            letter-spacing: .06em;
            border-radius: 10px; padding: .75rem;
            cursor: pointer; margin-top: .5rem;
            transition: all .25s; position: relative; overflow: hidden;
        }
        .btn-login::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(0,229,255,.1), transparent);
            opacity: 0; transition: opacity .2s;
        }
        .btn-login:hover {
            border-color: var(--cyan);
            box-shadow: 0 0 24px rgba(0,229,255,.2), inset 0 0 24px rgba(0,229,255,.05);
            transform: translateY(-1px);
        }
        .btn-login:hover::before { opacity: 1; }
        .btn-login:active { transform: none; }

        .back-link {
            display: flex; align-items: center; justify-content: center; gap: .4rem;
            font-size: .78rem; color: var(--text-soft); text-decoration: none;
            margin-top: 1.25rem; transition: color .15s;
        }
        .back-link:hover { color: var(--cyan); }
        .divider {
            display: flex; align-items: center; gap: 1rem;
            margin: 1.5rem 0;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1;
            height: 1px; background: var(--glass-border);
        }
        .divider span { font-size: .7rem; color: var(--text-soft); }
        .alert { border-radius: 10px; font-size: .83rem; padding: .6rem .9rem; border: none; margin-bottom: 1rem; }
        .alert-danger { background: rgba(239,68,68,.1); color: #fca5a5; border: 1px solid rgba(239,68,68,.2) !important; }
        .alert-warning { background: rgba(245,158,11,.1); color: #fcd34d; border: 1px solid rgba(245,158,11,.2) !important; }
    </style>
</head>
<body>
<div class="login-wrap">
    <div class="glow-ring"></div>
    <div class="card-outer">
        <div class="card-top">
            <div class="brand">
                <div class="brand-icon"><i class="bi bi-headset"></i></div>
                <span class="brand-name">Support Center</span>
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to your staff portal</p>
        </div>
        <div class="card-body-area">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}{% for cat, msg in messages %}
                <div class="alert alert-{{ cat }}">
                    <i class="bi bi-{% if cat == 'danger' %}exclamation-circle{% else %}info-circle{% endif %} me-2"></i>{{ msg }}
                </div>
                {% endfor %}{% endif %}
            {% endwith %}

            <form action="/auth" method="POST">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrap">
                        <input type="email" name="email" class="form-control pe-4"
                               placeholder="agent@support.com" autocomplete="email" required>
                        <span class="input-icon"><i class="bi bi-envelope"></i></span>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-wrap">
                        <input type="password" name="password" id="pwInput" class="form-control pe-5"
                               placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="toggle-pw" onclick="togglePw()">
                            <i class="bi bi-eye" id="eyeIco"></i>
                        </button>
                    </div>
                    <p class="hint">Leave blank if you haven't set a password yet.</p>
                </div>
                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right me-2"></i>SIGN IN
                </button>
            </form>
            <div class="divider"><span>or</span></div>
            <a href="/" class="back-link"><i class="bi bi-arrow-left"></i> Back to customer portal</a>
        </div>
    </div>
</div>
<script>
function togglePw() {
    const i = document.getElementById('pwInput');
    const e = document.getElementById('eyeIco');
    i.type = i.type === 'password' ? 'text' : 'password';
    e.className = i.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
</body>
</html>
